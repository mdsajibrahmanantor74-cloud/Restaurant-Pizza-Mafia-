<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Order form</title>
    <link rel="icon" type="image/png" href="images/logo.png" />
    <link rel="stylesheet" href="style.css" />
    <!-- Incon-Font Awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!-- Font-Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Handlee&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      .scroll-top {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: transparent;
        color: #fff;
        width: 45px;
        height: 45px;
        text-align: center;
        line-height: 45px;
        border-radius: 50%;
        z-index: 999;
      }

      /* Show only on mobile */
      @media (max-width: 768px) {
        .scroll-top {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <a href="#" class="scroll-top icon-style">
      <i class="fa fa-toggle-up"></i>
    </a>

    <div class="cotainer">
      <!-- Header Section Strat from here -->
      <header>
        <div class="row">
          <div class="col-lg-4">
            <div class="logo-div">
              <a href="#">
                <img class="logo" src="images/logo.png" alt="Logo" />
              </a>
            </div>
          </div>
          <div class="col-lg-8">
            <nav>
              <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#contact">contact</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </header>
      <!-- Header Section end here -->
      <h1 class="title">Pizza Mafia</h1>
      <!-- Main section start here -->
      <main>
        <div id="orderModal" class="modal">
          <div class="modal-content">
            <h2 class="title-on">Order Now</h2>
            <form
              action="https://formspree.io/f/xgopolpd"
              method="POST"
              class="order-form"
            >
              <div class="grid-itmes">
                <!-- NAME -->
                <input
                  type="text"
                  name="fullname"
                  placeholder="Your Name"
                  required
                />
                <!-- PHONE -->
                <input
                  type="tel"
                  name="phone"
                  placeholder="Phone Number"
                  required
                />
                <!-- ADDRESS -->
                <input
                  type="text"
                  name="address"
                  placeholder="Address"
                  required
                />

                <!-- BURGER -->
                <div class="form-group">
                  <select name="burger">
                    <option value="">Select Burger</option>
                    <option>Chicken Burger</option>
                    <option>Chicken Cheese Burger</option>
                    <option>Beef Burger</option>
                    <option>Overload Cheese Burger</option>
                  </select>
                </div>

                <!-- FRIES -->
                <div class="form-group">
                  <select name="fries">
                    <option value="">Select Fries or Appetizer</option>
                    <option>French Fry</option>
                    <option>Chicken Wings-6pcs</option>
                    <option>Chicken Wings-12pcs</option>
                    <option>Chicken Fry-4pcs</option>
                    <option>Chicken Fry-8pcs</option>
                  </select>
                </div>

                <!-- MEAT BOX -->
                <div class="form-group">
                  <select name="meatbox">
                    <option value="">Select Meat-Box</option>
                    <option>Student Meat-Box</option>
                    <option>Large Meat-Box</option>
                    <option>Special Meat-Box</option>
                  </select>
                </div>

                <!-- NOODLES -->
                <div class="form-group">
                  <select name="noodles">
                    <option value="">Select Noodles</option>
                    <option>Regular Noodles</option>
                    <option>Ramen</option>
                    <option>Chicken Chow-Mein</option>
                    <option>Mafia Special Chow-Mein</option>
                  </select>
                </div>

                <!-- PASTA -->
                <div class="form-group">
                  <select name="pasta">
                    <option value="">Select Pasta</option>
                    <option>Chicken Pasta</option>
                    <option>Oven Baked Chicken Pasta</option>
                    <option>Beef Pasta</option>
                    <option>Oven Baked Beef Pasta</option>
                  </select>
                </div>

                <!-- SHAWARMA -->
                <div class="form-group">
                  <select name="shawarma">
                    <option value="">Select Shawarma</option>
                    <option>Vegetable Shawarma</option>
                    <option>Chicken Shawarma</option>
                    <option>Beef Shawarma</option>
                    <option>Special Beef Shawarma</option>
                  </select>
                </div>
              </div>
              <!-- PIZZA -->
              <div class="form-group">
                <select name="pizza" required>
                  <option value="">Choose Pizza</option>
                  <option>Meat Lovers</option>
                  <option>Pizza E Mughal</option>
                  <option>Prawn Hub</option>
                  <option>Pablo Escober</option>
                  <option>Little One</option>
                  <option>Meatball Mania</option>
                  <option>Cheese Rush</option>
                  <option>Star Boy</option>
                  <option>Pizza Maxicana</option>
                  <option>BBQ Blust</option>
                  <option>Savage Sausage</option>
                  <option>Le Pepperoni</option>
                  <option>Margherita</option>
                  <option>Mushroom Rush</option>
                  <option>Pizza Paglis</option>
                </select>

                <!-- SIZE -->
                <div class="pizza-size">
                  <p style="padding: 10px">Select Pizza Size</p>

                  <label>
                    <input type="radio" name="size" value="S" /> S (8")
                  </label>

                  <label>
                    <input type="radio" name="size" value="M" /> M (10")
                  </label>

                  <label>
                    <input type="radio" name="size" value="L" /> L (12")
                  </label>

                  <label>
                    <input type="radio" name="size" value="XL" /> XL (14")
                  </label>
                </div>
              </div>

              <!-- SUBMIT -->
              <button type="submit" class="submit-btn">Place Order</button>
              <button type="reset" class="submit-btn">Clear</button>
            </form>
          </div>
        </div>
      </main>
      <!-- Main section end here -->
      <!-- Footer Section Strat from here -->
      <footer class="footer-2" id="contact">
        <div class="row">
          <div class="col-lg-4">
            <p>&copy; All right reserved by Pizza Mafia</p>
          </div>
          <div class="col-lg-4" style="text-align: center">
            <address>Monwar Complex, Thana Stand, Dhamrai, Dhaka</address>
            <div><p style="text-align: center">01969255266</p></div>
          </div>
          <div class="col-lg-4">
            <div class="social-menus">
              <a href="#" class="icon-style"><i class="fa fa-toggle-up"></i></a>
              <a
                href="https://www.facebook.com/profile.php?id=61565744823187&mibextid=zbwkwl"
                target="_blank"
                class="icon-style"
                ><i class="fa fa-facebook-official"></i
              ></a>
              <a
                href="https://www.instagram.com/pizzamafia.id/"
                target="_blank"
                class="icon-style"
                ><i class="fa fa-instagram"></i
              ></a>
            </div>
          </div>
        </div>
      </footer>
      <!-- Footer Section End here -->
    </div>
  </body>
</html>
